<style>
:root{--bg0:#050508;--bg1:#0b0b12;--line:rgba(255,255,255,.08);--txt:#f5f5fb;--mut:#b4b4c3;--shadow:0 28px 80px rgba(0,0,0,.56)}
*{box-sizing:border-box} html{scroll-behavior:smooth}
body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--txt);background:
radial-gradient(1100px 620px at 9% 10%, rgba(178,23,58,.18), transparent 56%),
radial-gradient(960px 620px at 88% 10%, rgba(93,70,204,.10), transparent 58%),
linear-gradient(180deg,var(--bg0),var(--bg1))}
.wrap{max-width:980px;margin:0 auto;padding:34px 18px 78px}
.topnav{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.topnav a,.topnav span{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#f1f1f6;text-decoration:none;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.hero,.panel{border:1px solid var(--line);border-radius:28px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.02));box-shadow:var(--shadow)}
.hero-copy{padding:30px 34px}
.kicker{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:10px 18px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);box-shadow:inset 0 1px 0 rgba(255,255,255,.05);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#f3f0fb;margin:0 0 18px}.kicker::before{content:"";width:8px;height:8px;border-radius:50%;background:linear-gradient(180deg,#ff5b93,#8e63ff);box-shadow:0 0 0 2px rgba(255,255,255,.06),0 0 10px rgba(255,91,147,.42)}
h1{margin:0;font-size:clamp(30px,4vw,54px);line-height:1.02;font-weight:900}
.sub{margin:12px 0 0;max-width:760px;color:var(--mut);line-height:1.65;font-size:15px}
.panel{margin-top:18px}
.panel-body{padding:22px}
.profile-grid{display:grid;grid-template-columns:120px 1fr;gap:20px;align-items:start}
.avatar-box{display:grid;gap:10px;justify-items:center}
.avatar-preview{width:108px;height:108px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#ff748f,#ff4f73);box-shadow:0 0 0 1px rgba(255,255,255,.12),0 0 28px rgba(255,79,115,.20);font-size:34px;font-weight:900}
.avatar-preview img{width:100%;height:100%;object-fit:cover;display:block}
.file-btn,.save-btn,.back-btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 16px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#fff;font:inherit;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;cursor:pointer}
.save-btn{background:linear-gradient(180deg,#ff748f,#ff4f73);border-color:rgba(255,140,168,.30)}
.file-btn input{display:none}
.fields{display:grid;gap:14px}
.field{display:grid;gap:8px}
label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.62)}
.input,.textarea{width:100%;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#fff;padding:14px 16px;font:inherit;outline:none}
.textarea{min-height:120px;resize:vertical;line-height:1.55}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.status{min-height:18px;color:rgba(255,255,255,.68);font-size:12px}
@media (max-width:760px){.profile-grid{grid-template-columns:1fr}.hero-copy,.panel-body{padding:18px}}
</style>

    </div>
  </div></section>
</div>
