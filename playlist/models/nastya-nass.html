<script id="alexia-trex-inline-comments-fix-js">
(function(){
  if (window.__alexiaTrexInlineCommentsFix) return;
  window.__alexiaTrexInlineCommentsFix = true;
  var pagePath = (location.pathname || '/').replace(/\.html$/i, '');
  var likedKey = 'alexia_comment_likes::' + pagePath;
  var bumpKey = 'alexia_comment_like_bumps::' + pagePath;
  function mapGet(key){ try { return JSON.parse(localStorage.getItem(key) || '{}') || {}; } catch(e){ return {}; } }
  function mapSet(key, val){ try { localStorage.setItem(key, JSON.stringify(val || {})); } catch(e){} }
  function ensureModal(){
    var modal = document.getElementById('alexia-trex-profile-modal');
    if (modal) return modal;
    modal = document.createElement('div');
    modal.id = 'alexia-trex-profile-modal';
    modal.className = 'alexia-trex-profile-modal';
    modal.innerHTML = '<div class="alexia-trex-profile-card"><div class="alexia-trex-profile-head"><div class="alexia-trex-profile-avatar" data-avatar></div><div><h3 data-name></h3><p data-meta>Community profile</p></div></div><p data-body>Profile details</p><button class="alexia-trex-profile-close" type="button">Close</button></div>';
    modal.addEventListener('click', function(e){ if (e.target === modal) modal.classList.remove('open'); });
    modal.querySelector('.alexia-trex-profile-close').addEventListener('click', function(){ modal.classList.remove('open'); });
    document.body.appendChild(modal);
    return modal;
  }
  function openProfile(node){
    var wrap = node && node.closest('[data-comment-id]');
    if (!wrap) return;
    var name = wrap.getAttribute('data-username') || 'Guest';
    var body = (wrap.querySelector('.yt-comment-text') || {}).textContent || 'Community profile';
    var meta = ((wrap.querySelector('.yt-comment-time') || {}).textContent || '').trim() || 'Community profile';
    var modal = ensureModal();
    modal.querySelector('[data-avatar]').textContent = String(name).trim().charAt(0).toUpperCase() || 'G';
    modal.querySelector('[data-name]').textContent = name;
    modal.querySelector('[data-meta]').textContent = meta;
    modal.querySelector('[data-body]').textContent = body;
    modal.classList.add('open');
  }
  async function syncLike(id, nextLikes){
    try {
      if (!(window.supabase && window.SUPABASE_URL && window.SUPABASE_KEY)) return;
      var client = window.__alexiaInlineLikeClient || (window.__alexiaInlineLikeClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY));
      await client.from('video_comments').update({ likes_count: nextLikes }).eq('id', id);
    } catch(e){}
  }
  document.addEventListener('pointerover', function(e){ var p=e.target.closest && e.target.closest('[data-open-profile]'); if (p) { e.stopImmediatePropagation(); } }, true);
  document.addEventListener('pointerout', function(e){ var p=e.target.closest && e.target.closest('[data-open-profile]'); if (p) { e.stopImmediatePropagation(); } }, true);
  document.addEventListener('click', function(e){
    var likeBtn = e.target.closest && e.target.closest('[data-like-id]');
    if (likeBtn) {
      e.preventDefault(); e.stopImmediatePropagation();
      var id = String(likeBtn.getAttribute('data-like-id') || '');
      var liked = mapGet(likedKey), bumps = mapGet(bumpKey);
      var countEl = likeBtn.querySelector('.count');
      var current = Number(countEl && countEl.textContent || '0') || 0;
      var next = liked[id] ? Math.max(0, current - 1) : current + 1;
      if (liked[id]) { delete liked[id]; delete bumps[id]; likeBtn.classList.remove('is-liked'); }
      else { liked[id] = 1; bumps[id] = 1; likeBtn.classList.add('is-liked'); }
      mapSet(likedKey, liked); mapSet(bumpKey, bumps);
      if (countEl) countEl.textContent = String(next);
      syncLike(id, next);
      return;
    }
    var profile = e.target.closest && e.target.closest('[data-open-profile], .yt-comment-author, .yt-comment-avatar');
    if (profile) {
      e.preventDefault(); e.stopImmediatePropagation();
      openProfile(profile);
      return;
    }
  }, true);
})();
</script>
