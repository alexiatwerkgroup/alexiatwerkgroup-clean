<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Redirecting to the right page...</title>
<meta name="robots" content="noindex,nofollow"/>
<style>
html,body{
  margin:0;
  min-height:100%;
  background:
    radial-gradient(circle at top, rgba(255,255,255,.05), transparent 28%),
    linear-gradient(180deg,#040404 0%,#0a0a0a 100%);
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
}
body{
  display:grid;
  place-items:center;
  padding:24px;
}
.fallback-card{
  width:min(720px,100%);
  padding:28px;
  border-radius:28px;
  border:1px solid rgba(255,255,255,.10);
  background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018));
  box-shadow:0 24px 80px rgba(0,0,0,.32);
}
.fallback-card h1{
  margin:0 0 12px;
  font-size:clamp(28px,4vw,42px);
  line-height:1.02;
}
.fallback-card p{
  margin:0 0 12px;
  color:rgba(255,255,255,.76);
  font-size:15px;
  line-height:1.65;
}
.fallback-actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:18px;
}
.fallback-actions a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:44px;
  padding:0 16px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);
  color:#fff;
  text-decoration:none;
  font-size:13px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.fallback-actions a:hover{
  background:rgba(255,255,255,.10);
}
.recovery-player{
  display:grid;
  gap:14px;
  margin-top:18px;
}
.recovery-frame{
  position:relative;
  width:100%;
  border-radius:20px;
  overflow:hidden;
  background:#000;
  border:1px solid rgba(255,255,255,.08);
}
.recovery-frame::before{
  content:"";
  display:block;
  padding-top:56.25%;
}
.recovery-frame iframe,
.recovery-frame img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
  object-fit:cover;
}
.recovery-title{
  margin:0;
  font-size:clamp(22px,3vw,30px);
  line-height:1.12;
}
.recovery-copy{
  margin:0;
  color:rgba(255,255,255,.78);
}
</style>
<script>
(function(){
  try {
    var path = String(window.location.pathname || '/');
    var detail = path.match(/^\/playlist\/([^\/?#]+?)(?:\.html)?\/?$/i);
    if (detail && detail[1].toLowerCase() !== 'index') {
      window.__alexiaRequestedPlaylistFile = detail[1] + '.html';
      return;
    }
    var params = new URLSearchParams(window.location.search || '');
    var requested = String(params.get('open') || '').trim();
    if (requested) {
      window.__alexiaRequestedPlaylistFile = requested;
    }
  } catch (e) {}
})();
</script>
<script src="/assets/playlist-recovery-map.js" defer></script>
</head>
<body>
  <div class="fallback-card">
    <h1>Page not found</h1>
    <p>This route did not resolve correctly on the host, but we can still try to recover the requested video here.</p>
    <p id="fallback-copy">Use one of the safe links below if recovery does not load.</p>
    <div id="recovery-player" class="recovery-player" hidden>
      <div class="recovery-frame" id="recovery-frame"></div>
      <h2 class="recovery-title" id="recovery-title"></h2>
      <p class="recovery-copy" id="recovery-description"></p>
    </div>
    <div class="fallback-actions">
      <a href="/playlist/">Open Playlist</a>
      <a href="/home.html">Open Home</a>
      <a href="/top-100-twerk-videos.html">Open Top 100</a>
      <a id="recovery-watch-link" href="/playlist/" target="_self">Open Requested Video</a>
    </div>
  </div>
<script>
(function(){
  var requestedFile = String(window.__alexiaRequestedPlaylistFile || '').trim();
  if (!requestedFile) return;

  function normalize(value){
    return String(value || '')
      .trim()
      .toLowerCase()
      .replace(/%25/g, '%')
      .replace(/\.html$/i, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '');
  }

  function runRecovery(){
    var items = Array.isArray(window.__alexiaPlaylistRecoveryMap) ? window.__alexiaPlaylistRecoveryMap : [];
      if (!Array.isArray(items) || !items.length) {
        var copyEmpty = document.getElementById('fallback-copy');
        if (copyEmpty) copyEmpty.textContent = 'Recovery map did not load on this host.';
        return;
      }
      var requestedExact = String(requestedFile || '').trim().toLowerCase();
      var requestedSlug = normalize(requestedFile);
      var match = items.find(function(item){
        var filename = String(item && item.filename || '').trim().toLowerCase();
        var slug = String(item && item.slug || '').trim().toLowerCase();
        return filename === requestedExact ||
               slug === requestedSlug ||
               normalize(filename) === requestedSlug ||
               normalize(slug) === requestedSlug;
      });
      if (!match) {
        var copyMissing = document.getElementById('fallback-copy');
        if (copyMissing) copyMissing.textContent = 'Recovery map loaded, but this slug was not found: ' + requestedFile;
        return;
      }

      var title = String(match.title || match.slug || requestedFile).replace(/\s+\|\s+Replay Highlights.*$/i, '');
      var desc = String(match.description || 'Recovered from the playlist fallback because this host did not resolve the direct page correctly.');
      var frame = document.getElementById('recovery-frame');
      var box = document.getElementById('recovery-player');
      var titleEl = document.getElementById('recovery-title');
      var descEl = document.getElementById('recovery-description');
      var copyEl = document.getElementById('fallback-copy');
      var watchLink = document.getElementById('recovery-watch-link');

      titleEl.textContent = title;
      descEl.textContent = desc;
      if (match.videoId) {
        frame.innerHTML = '<iframe src="https://www.youtube.com/embed/' + String(match.videoId).replace(/"/g, '') + '?rel=0&playsinline=1" title="' + title.replace(/"/g, '&quot;') + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>';
        watchLink.href = 'https://www.youtube.com/watch?v=' + encodeURIComponent(match.videoId);
      } else if (match.thumb) {
        frame.innerHTML = '<img src="' + String(match.thumb).replace(/"/g, '&quot;') + '" alt="">';
        watchLink.href = '/playlist/';
      } else {
        watchLink.href = '/playlist/';
      }
      watchLink.textContent = match.videoId ? 'Watch on YouTube' : 'Open Playlist';
      copyEl.textContent = 'Recovered requested file: ' + requestedFile;
      box.hidden = false;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runRecovery, { once:true });
  } else {
    runRecovery();
  }
})();
</script>
</body>
</html>
